<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ADJD Telecomunicaciones - Nuevo Cliente</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

</head>

<body class="bg-[#f8fafc] text-[#1e293b] min-h-screen flex flex-col justify-between">

<main class="flex-grow flex items-center justify-center px-4 py-12">

    <div class="w-full max-w-md">

        <div class="bg-white rounded-3xl border border-gray-100 shadow-xl p-8">

            <div class="text-center mb-8">

                <h2 class="text-xl font-bold text-[#0f172a]">
                    Registrar Cliente
                </h2>

                <p class="text-xs text-[#64748b] mt-1">
                    Ingresa la información del nuevo cliente
                </p>

            </div>

            <form th:action="@{/clientes/guardar}"
                  th:object="${cliente}"
                  method="post"
                  class="space-y-5">

                <input type="hidden" th:field="*{id}">

                <div>

                    <label for="cedula"
                           class="block text-xs font-medium text-[#475569] mb-1.5">

                        Cédula

                    </label>

                    <input type="text"
                           id="cedula"
                           th:field="*{cedula}"

                           class="w-full px-4 py-3 bg-[#f1f5f9] border border-transparent rounded-xl text-sm focus:bg-white focus:border-gray-300 focus:outline-none transition placeholder-gray-400"

                           required
                           placeholder="Ej: 1034567890">

                </div>

                <div>

                    <label for="nombre"
                           class="block text-xs font-medium text-[#475569] mb-1.5">

                        Nombre Completo

                    </label>

                    <input type="text"
                           id="nombre"
                           th:field="*{nombre}"
                           class="w-full px-4 py-3 bg-[#f1f5f9] border border-transparent rounded-xl text-sm focus:bg-white focus:border-gray-300 focus:outline-none transition placeholder-gray-400"
                           required
                           placeholder="Ej: Laura Martínez">

                    <p th:if="${#fields.hasErrors('nombre')}"
                       th:errors="*{nombre}"
                       class="text-red-500 text-xs mt-1">
                    </p>
                </div>

                <div>

                    <label for="telefono"
                           class="block text-xs font-medium text-[#475569] mb-1.5">

                        Número de Teléfono

                    </label>

                    <input type="text"
                           id="telefono"
                           th:field="*{telefono}"

                           class="w-full px-4 py-3 bg-[#f1f5f9] border border-transparent rounded-xl text-sm focus:bg-white focus:border-gray-300 focus:outline-none transition placeholder-gray-400"

                           required
                           placeholder="Ej: 3001234567">

                </div>

                <div>

                    <label for="direccion"
                           class="block text-xs font-medium text-[#475569] mb-1.5">

                        Dirección

                    </label>

                    <input type="text"
                           id="direccion"
                           th:field="*{direccion}"

                           class="w-full px-4 py-3 bg-[#f1f5f9] border border-transparent rounded-xl text-sm focus:bg-white focus:border-gray-300 focus:outline-none transition placeholder-gray-400"

                           placeholder="Ej: Calle 10 #20-30">

                </div>

                <div>

                    <label for="correo"
                           class="block text-xs font-medium text-[#475569] mb-1.5">

                        Correo Electrónico

                    </label>

                    <input type="email"
                           id="correo"
                           th:field="*{correo}"
                           class="w-full px-4 py-3 bg-[#f1f5f9] border border-transparent rounded-xl text-sm focus:bg-white focus:border-gray-300 focus:outline-none transition placeholder-gray-400"
                           required
                           placeholder="Ej: cliente@gmail.com">

                    <p th:if="${#fields.hasErrors('correo')}"
                       th:errors="*{correo}"
                       class="text-red-500 text-xs mt-1">
                    </p>

                </div>

                <div class="pt-4 flex flex-col gap-2">

                    <button type="submit"
                            class="w-full bg-[#334155] hover:bg-[#1e293b] text-white text-sm font-medium py-3 rounded-xl transition shadow-sm">

                        Guardar Cliente

                    </button>

                    <a th:href="@{/clientes}"
                       class="w-full text-center text-xs text-[#64748b] hover:text-[#1e293b] py-2 transition">

                        Cancelar y volver

                    </a>

                </div>

            </form>

        </div>

    </div>

</main>

</body>
</html>
