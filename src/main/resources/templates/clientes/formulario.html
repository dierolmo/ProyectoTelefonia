<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nuevo Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        Nuevo Cliente
                    </h4>
                </div>

                <div class="card-body">

                    <form th:action="@{/clientes/guardar}"
                          th:object="${cliente}"
                          method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">

                            <label class="form-label">
                                Cédula:
                            </label>

                            <input type="text"
                                   th:field="*{cedula}"
                                   class="form-control"
                                   required
                                   placeholder="Ej. 123456789">

                        </div>
                        <div class="mb-3">

                            <label class="form-label">
                                Nombre Completo:
                            </label>

                            <input type="text"
                                   th:field="*{nombre}"
                                   class="form-control"
                                   required
                                   placeholder="Ej. Juan Pérez">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Correo Electrónico:
                            </label>

                            <input type="email"
                                   th:field="*{correo}"
                                   class="form-control"
                                   required
                                   placeholder="Ej. correo@gmail.com">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Número de Teléfono:
                            </label>

                            <input type="text"
                                   th:field="*{telefono}"
                                   class="form-control"
                                   required
                                   placeholder="Ej. 3001234567">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Dirección:
                            </label>

                            <input type="text"
                                   th:field="*{direccion}"
                                   class="form-control"
                                   placeholder="Ej. Calle 10 #20-30">

                        </div>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/clientes}"
                               class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit"
                                    class="btn btn-primary">
                                Guardar Cliente
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
