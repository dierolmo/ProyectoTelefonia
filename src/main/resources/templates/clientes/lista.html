<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h3 class="mb-0">
                Clientes
            </h3>

            <a th:href="@{/clientes/nuevo}"
               class="btn btn-light btn-sm">
                Crear Nuevo Cliente
            </a>

        </div>

        <div class="card-body">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Cédula</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(listaClientes)}">

                    <td colspan="6"
                        class="text-center text-muted">

                        No hay clientes registrados en el sistema.

                    </td>

                </tr>

                <tr th:each="c : ${listaClientes}">

                    <td th:text="${c.id}">1</td>

                    <td th:text="${c.nombre}">
                        Juan Pérez
                    </td>
                    <td th:text="${c.cedula}">1234567890</td>

                    <td th:text="${c.correo}">
                        correo@gmail.com
                    </td>

                    <td th:text="${c.telefono}">
                        3001234567
                    </td>

                    <td th:text="${c.direccion}">
                        Calle 10 #20-30
                    </td>

                    <td>

                        <a th:href="@{/clientes/editar/{id}(id=${c.id})}"
                           class="btn btn-warning btn-sm">

                            Editar

                        </a>

                        <a th:href="@{/clientes/eliminar/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Estás seguro de eliminar este cliente?')">

                            Eliminar

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
