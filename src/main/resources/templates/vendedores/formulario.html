<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ADJD Telecomunicaciones - Nuevo Vendedor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] min-h-screen flex flex-col justify-between">

<main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

        <div class="bg-white rounded-3xl border border-gray-100 shadow-xl p-8">

            <div class="text-center mb-8">
                <h2 class="text-xl font-bold text-[#0f172a]">Registrar Vendedor</h2>
                <p class="text-xs text-[#64748b] mt-1">Ingresa las credenciales del nuevo miembro del equipo</p>
            </div>

            <form th:action="@{/vendedores/guardar}" th:object="${vendedor}" method="post" class="space-y-5">

                <div>
                    <label for="codigoVendedor" class="block text-xs font-medium text-[#475569] mb-1.5">Código del Vendedor</label>
                    <input type="text" id="codigoVendedor" th:field="*{codigoVendedor}"
                           class="w-full px-4 py-3 bg-[#f1f5f9] border border-transparent rounded-xl text-sm focus:bg-white focus:border-gray-300 focus:outline-none transition placeholder-gray-400"
                           required placeholder="Ej: VEND-2026">
                </div>

                <div>
                    <label for="nombre" class="block text-xs font-medium text-[#475569] mb-1.5">Nombre Completo</label>
                    <input type="text" id="nombre" th:field="*{nombre}"
                           class="w-full px-4 py-3 bg-[#f1f5f9] border border-transparent rounded-xl text-sm focus:bg-white focus:border-gray-300 focus:outline-none transition placeholder-gray-400"
                           required placeholder="Ej: Camilo Villegas">
                </div>

                <div class="pt-4 flex flex-col gap-2">
                    <button type="submit" class="w-full bg-[#334155] hover:bg-[#1e293b] text-white text-sm font-medium py-3 rounded-xl transition shadow-sm">
                        Guardar Vendedor
                    </button>
                    <a th:href="@{/vendedores}" class="w-full text-center text-xs text-[#64748b] hover:text-[#1e293b] py-2 transition">
                        Cancelar y volver
                    </a>
                </div>
            </form>
        </div>

    </div>
</main>

</body>
</html>
