<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ADJD Telecomunicaciones - Nuevo Plan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] min-h-screen flex flex-col justify-between">

<nav class="bg-[#1e293b] text-white px-8 py-4 flex justify-between items-center shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center font-bold text-sm">AD</div>
    <span class="font-semibold text-lg tracking-tight">ADJD Telecomunicaciones</span>
  </div>
  <div class="flex items-center gap-6 text-sm text-gray-300">
    <a th:href="@{/home}" class="hover:text-white transition">Inicio</a>
    <a th:href="@{/clientes}" class="hover:text-white transition">Clientes</a>
    <a th:href="@{/vendedores}" class="hover:text-white transition">Vendedores</a>
    <a th:href="@{/planes}" class="text-white font-medium border-b-2 border-white pb-1">Planes</a>
  </div>
</nav>

<main class="flex-grow flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl border border-gray-100 shadow-xl p-8">

      <div class="mb-6">
        <h2 class="text-xl font-bold text-[#0f172a]">Nuevo Plan de Telefonía</h2>
        <p class="text-xs text-[#64748b]">Completa la información para registrar o actualizar el paquete</p>
      </div>

      <form th:action="@{/planes/guardar}" th:object="${plan}" method="post" class="space-y-4">

        <input type="hidden" th:field="*{id}">

        <div>
          <label class="block text-xs font-semibold text-[#475569] uppercase tracking-wider mb-1.5">Nombre del Plan:</label>
          <input type="text" th:field="*{nombre}" required placeholder="Ej. Plan Ultra 5G"
                 class="w-full px-4 py-2.5 bg-[#f8fafc] border border-gray-200 rounded-xl text-sm text-[#1e293b] placeholder-gray-400 focus:outline-none focus:border-slate-400 focus:bg-white transition">
        </div>

        <div>
          <label class="block text-xs font-semibold text-[#475569] uppercase tracking-wider mb-1.5">Precio Mensual ($):</label>
          <input type="number" step="0.01" th:field="*{precio}" required placeholder="0.00"
                 class="w-full px-4 py-2.5 bg-[#f8fafc] border border-gray-200 rounded-xl text-sm text-[#1e293b] placeholder-gray-400 focus:outline-none focus:border-slate-400 focus:bg-white transition">
        </div>

        <div>
          <label class="block text-xs font-semibold text-[#475569] uppercase tracking-wider mb-1.5">Minutos incluidos:</label>
          <input type="number" th:field="*{minutos}" required placeholder="Ej. 500"
                 class="w-full px-4 py-2.5 bg-[#f8fafc] border border-gray-200 rounded-xl text-sm text-[#1e293b] placeholder-gray-400 focus:outline-none focus:border-slate-400 focus:bg-white transition">
        </div>

        <div>
          <label class="block text-xs font-semibold text-[#475569] uppercase tracking-wider mb-1.5">Gigas de internet:</label>
          <input type="number" th:field="*{gigas}" required placeholder="Ej. 40"
                 class="w-full px-4 py-2.5 bg-[#f8fafc] border border-gray-200 rounded-xl text-sm text-[#1e293b] placeholder-gray-400 focus:outline-none focus:border-slate-400 focus:bg-white transition">
        </div>

        <div class="flex items-center justify-between pt-4 gap-4">
          <a th:href="@{/planes}"
             class="w-1/2 text-center text-xs font-semibold text-[#64748b] hover:text-[#1e293b] py-3 rounded-xl bg-[#f1f5f9] hover:bg-gray-200/70 transition">
            Cancelar
          </a>
          <button type="submit"
                  class="w-1/2 text-center text-xs font-semibold text-white py-3 rounded-xl bg-[#334155] hover:bg-[#1e293b] transition shadow-sm">
            Guardar Plan
          </button>
        </div>

      </form>
    </div>
  </div>
</main>

</body>
</html>
