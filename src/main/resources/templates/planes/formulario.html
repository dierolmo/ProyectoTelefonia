<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registrar Nuevo Plan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">Nuevo Plan de Telefonía</h4>
        </div>
        <div class="card-body">

          <form th:action="@{/planes/guardar}" th:object="${plan}" method="post">

            <div class="mb-3">
              <label class="form-label">Nombre del Plan:</label>
              <input type="text" th:field="*{nombre}" class="form-label form-control" required placeholder="Ej. Plan Ultra 5G">
            </div>

            <div class="mb-3">
              <label class="form-label">Precio Mensual ($):</label>
              <input type="number" step="0.01" th:field="*{precio}" class="form-control" required placeholder="0.00">
            </div>

            <div class="mb-3">
              <label class="form-label">Minutos incluidos:</label>
              <input type="number" th:field="*{minutos}" class="form-control" required placeholder="Ej. 500">
            </div>

            <div class="mb-3">
              <label class="form-label">Gigas de internet:</label>
              <input type="number" th:field="*{gigas}" class="form-control" required placeholder="Ej. 40">
            </div>

            <div class="d-flex justify-content-between">
              <a th:href="@{/planes}" class="btn btn-secondary">Cancelar</a>
              <button type="submit" class="btn btn-success">Guardar Plan</button>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
