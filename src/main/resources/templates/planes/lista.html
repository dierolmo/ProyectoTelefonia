<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ADJD Telecomunicaciones - Planes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] min-h-screen">

<nav class="bg-[#1e293b] text-white px-8 py-4 flex justify-between items-center shadow-sm">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center font-bold text-sm">AD</div>
    <span class="font-semibold text-lg tracking-tight">ADJD Telecomunicaciones</span>
  </div>
  <div class="flex items-center gap-6 text-sm text-gray-300">
    <a th:href="@{/home}" class="hover:text-white transition">Inicio</a>
    <a th:href="@{/clientes}" class="hover:text-white transition">Clientes</a>
    <a th:href="@{/vendedores}" class="hover:text-white transition">Vendedores</a>
    <a th:href="@{/planes}" class="text-white font-medium border-b-2 border-white pb-1">Planes</a>
  </div>
</nav>

<main class="max-w-5xl mx-auto mt-12 px-6">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-2xl font-bold text-[#0f172a]">Gestión de Planes</h1>
      <p class="text-sm text-[#64748b]">Administra los paquetes de conectividad disponibles</p>
    </div>
    <a th:href="@{/planes/nuevo}" class="bg-[#334155] hover:bg-[#1e293b] text-white text-sm font-medium px-5 py-2.5 rounded-xl transition shadow-sm">+ Nuevo Plan</a>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead>
      <tr class="bg-[#f1f5f9] border-b border-gray-100 text-xs font-semibold uppercase tracking-wider text-[#475569]">
        <th class="py-4 px-6">Nombre del Plan</th>
        <th class="py-4 px-6">Velocidad / Datos</th>
        <th class="py-4 px-6">Precio Mensual</th>
      </tr>
      </thead>
      <tbody class="divide-y divide-gray-100 text-sm text-[#334155]">
      <!-- Aquí debería ir el th:each de planes -->
      <tr th:each="plan : ${planes}" class="hover:bg-slate-50/50 transition">
        <td class="py-4 px-6 font-medium text-[#0f172a]" th:text="${plan.nombre}"></td>
        <td class="py-4 px-6" th:text="${plan.detalles}"></td>
        <td class="py-4 px-6 font-semibold" th:text="${plan.precio}"></td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
