<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lista de Planes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Planes de Telefonía</h3>
      <a th:href="@{/planes/nuevo}" class="btn btn-light btn-sm">Crear Nuevo Plan</a>
    </div>
    <div class="card-body">

      <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre del Plan</th>
          <th>Precio</th>
          <th>Minutos</th>
          <th>Gigas</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(listaPlanes)}">
          <td colspan="5" class="text-center text-muted">No hay planes registrados en el sistema.</td>
        </tr>
        <tr th:each="p : ${listaPlanes}">
          <td th:text="${p.id}">1</td>
          <td th:text="${p.nombre}">Plan Control</td>
          <td th:text="'$' + ${p.precio}">$0.0</td>
          <td th:text="${p.minutos}">0</td>
          <td th:text="${p.gigas}">0</td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>
</div>

</body>
</html>
